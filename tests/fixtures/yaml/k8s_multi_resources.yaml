apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: prod
data:
  LOG_LEVEL: info
  DATABASE_HOST: db.internal
---
apiVersion: v1
kind: Secret
metadata:
  name: api-secret
  namespace: prod
type: Opaque
data:
  apiKey: c3VwZXJzZWNyZXQ=
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-netpol
  namespace: prod
spec:
  podSelector:
    matchLabels:
      app: api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              role: trusted
      ports:
        - port: 8080
          protocol: TCP
